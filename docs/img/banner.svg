<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 340" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#58a6ff"/>
      <stop offset="1" stop-color="#bc8cff"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="340" fill="url(#bg)"/>

  <!-- grid background lines -->
  <g stroke="#21262d" stroke-width="0.5" opacity="0.5">
    <line x1="0" y1="60"  x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/>
    <line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
  </g>

  <!-- left column: raw bytes -->
  <g font-size="14" fill="#7ee787">
    <text x="60" y="50"  opacity="0.30">4D 5A 90 00 03 00 00 00 04 00 00 00 FF FF</text>
    <text x="60" y="80"  opacity="0.45">50 45 00 00 64 86 0F 00 ...</text>
    <text x="60" y="105" opacity="0.60">59 5A 41 58 C3</text>
    <text x="60" y="130" opacity="0.80">48 87 E0 C3</text>
    <text x="60" y="155" opacity="1.00">0F 05</text>
  </g>

  <!-- center title -->
  <text x="60" y="220" font-size="78" font-weight="800" fill="url(#title)">rop_scanner</text>
  <text x="64" y="252" font-size="20" fill="#8b949e">offline PE → Zydis → ROP / JOP / syscall / pivot gadgets</text>
  <text x="64" y="278" font-size="15" fill="#6e7681">Windows  ·  Linux  ·  macOS    —    one codebase, three OSes</text>

  <!-- right column: decoded gadgets -->
  <g font-size="14" font-family="monospace">
    <text x="780" y="50"  fill="#ff7b72" opacity="0.30">mov rax, [rsp+0x10] ; ret</text>
    <text x="780" y="80"  fill="#ff7b72" opacity="0.45">pop rcx ; pop rdx ; pop r8 ; ret</text>
    <text x="780" y="105" fill="#ff7b72" opacity="0.60">add rsp, 0x30 ; pop rdi ; ret</text>
    <text x="780" y="130" fill="#ff7b72" opacity="0.80">xchg rax, rsp ; ret</text>
    <text x="780" y="155" fill="#ff7b72" opacity="1.00">syscall</text>
  </g>

  <!-- footer / credits -->
  <text x="60" y="316" font-size="12" fill="#6e7681">based on the idea by 0x12 Dark Development (@Salsa12__) · "Hunting ROP Gadgets in Windows DLLs"</text>
</svg>
